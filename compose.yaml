services:
  # 1. Сервис подготовки базы данных (выполняет миграции и сиды)
  db-init:
    build: .
    user: root
    environment:
      - DB_HOST=pgsql
      - DB_DATABASE=${DB_DATABASE:-notification_service}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - ".:/var/www/html"
    command: php artisan migrate --force --seed --no-interaction
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - app-network

  # 2. Основное API (Laravel)
  app:
    build: .
    user: root
    ports:
      - "${APP_PORT:-8080}:8000"
    environment:
      - DB_HOST=pgsql
      - DB_DATABASE=${DB_DATABASE:-notification_service}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - REDIS_HOST=redis
    volumes:
      - ".:/var/www/html"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - app-network

  # 3. Outbox Relay (мониторинг таблиц)
  outbox-relay:
    build: .
    user: root
    environment:
      - DB_HOST=pgsql
      - DB_DATABASE=${DB_DATABASE:-notification_service}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - ".:/var/www/html"
    command: php artisan app:process-outbox --limit=100
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: always
    networks:
      - app-network

  # 4. Очередь (Worker)
  worker:
    build: .
    user: root
    environment:
      - DB_HOST=pgsql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - DB_DATABASE=${DB_DATABASE:-notification_service}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - ".:/var/www/html"
    command: php artisan queue:work
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: always
    networks:
      - app-network

  # 5. База данных PostgreSQL
  pgsql:
    image: "postgres:15-alpine"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-notification_service}"
      POSTGRES_USER: "${DB_USERNAME:-sail}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-password}"
    volumes:
      - "db-data:/var/lib/postgresql/data"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sail} -d ${DB_DATABASE:-notification_service}"]
      interval: 3s
      timeout: 3s
      retries: 5

  # 6. Redis
  redis:
    image: "redis:alpine"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
